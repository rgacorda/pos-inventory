<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - POS System</title>
  <meta name="theme-color" content="#000000">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 16px;
    }
    
    p {
      font-size: 16px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .tip {
      background: #eff6ff;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    
    .tip strong {
      color: #1e40af;
    }
    
    button {
      width: 100%;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .btn-primary {
      background: #000;
      color: white;
      margin-bottom: 12px;
    }
    
    .btn-primary:hover {
      background: #333;
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: transparent;
      color: #6b7280;
      border: 2px solid #e5e7eb;
    }
    
    .btn-secondary:hover {
      border-color: #9ca3af;
      color: #374151;
    }
    
    .status {
      display: inline-block;
      padding: 8px 16px;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    
    .status.online {
      background: #d1fae5;
      color: #065f46;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </div>
    
    <div id="status" class="status">Offline</div>
    
    <h1>You're Currently Offline</h1>
    
    <p>This page isn't available because you're not connected to the internet. Please check your connection and try again.</p>
    
    <div class="tip">
      <p style="margin: 0; color: #1e40af; font-size: 14px;">
        <strong>💡 Tip:</strong> Most of the POS system works offline once pages are cached. Make sure to visit pages while online first.
      </p>
    </div>
    
    <button class="btn-primary" onclick="location.reload()">
      Try Again
    </button>
    
    <button class="btn-secondary" onclick="history.back()">
      Go Back
    </button>
  </div>
  
  <script>
    // Update UI based on online status
    function updateStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.textContent = 'Online';
        statusEl.className = 'status online';
        // Auto-reload when back online
        setTimeout(() => location.reload(), 1000);
      } else {
        statusEl.textContent = 'Offline';
        statusEl.className = 'status';
      }
    }
    
    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    
    // Initial check
    updateStatus();
  </script>
</body>
</html>
